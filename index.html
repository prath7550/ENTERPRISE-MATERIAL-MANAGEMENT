<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Material Manager - Stage 3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .sidebar-item { transition: all 0.2s; border-left: 3px solid transparent; cursor: pointer; }
        .sidebar-item.active { border-left-color: #4f46e5; background-color: #eef2ff; color: #4f46e5; }
        .data-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-800">

    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col">
        <div class="p-6 text-xl font-bold text-indigo-600 flex items-center gap-2">
            <span class="bg-indigo-600 text-white p-1 rounded-lg text-sm">MB</span> STAGE 3
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <button onclick="showTab('dashboard')" id="btn-dashboard" class="sidebar-item active w-full text-left px-4 py-3 font-medium rounded-lg">Dashboard</button>
            <button onclick="showTab('items')" id="btn-items" class="sidebar-item w-full text-left px-4 py-3 font-medium rounded-lg">Items</button>
            <button onclick="showTab('parties')" id="btn-parties" class="sidebar-item w-full text-left px-4 py-3 font-medium rounded-lg">Parties</button>
            <button onclick="showTab('inward-entry')" id="btn-inward-entry" class="sidebar-item w-full text-left px-4 py-3 font-medium rounded-lg">Inward/Damage Entry</button>
            <button onclick="showTab('inward-ledger')" id="btn-inward-ledger" class="sidebar-item w-full text-left px-4 py-3 font-medium rounded-lg">Inward/Damage Ledger</button>
            <button onclick="showTab('booking-entry')" id="btn-booking-entry" class="sidebar-item w-full text-left px-4 py-3 font-medium rounded-lg">Create Booking</button>
            <button onclick="showTab('booking-ledger')" id="btn-booking-ledger" class="sidebar-item w-full text-left px-4 py-3 font-medium rounded-lg">Booking Ledger</button>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <div class="max-w-6xl mx-auto">
            <h1 id="page-title" class="text-2xl font-bold mb-6 text-slate-900">Dashboard</h1>
            
            <div id="view-dashboard" class="space-y-6">
                <div class="data-card p-6">
                    <h3 class="font-bold mb-4 text-lg">Inventory Summary</h3>
                    <table class="w-full text-left border-collapse">
                        <thead><tr class="text-slate-500 border-b text-sm uppercase"><th class="pb-4">Item Name</th><th class="pb-4">Inward Stock</th><th class="pb-4">Damaged</th><th class="pb-4">Booked</th><th class="pb-4">Balance</th></tr></thead>
                        <tbody id="dashboard-table-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-items" class="hidden space-y-6">
                <div class="data-card p-6">
                    <h3 class="font-bold mb-4">Register Material</h3>
                    <div class="flex gap-4">
                        <input type="text" id="new-item-name" placeholder="Item name" class="flex-1 border rounded-lg px-4 py-2 text-sm">
                        <button onclick="addMaterial()" class="bg-indigo-600 text-white px-6 rounded-lg text-sm font-semibold">Register</button>
                    </div>
                    <div id="material-list" class="mt-4"></div>
                </div>
            </div>
            
            <div id="view-parties" class="hidden space-y-6">
                <div class="data-card p-6">
                    <h3 class="font-bold mb-4">Register Party</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input type="text" id="party-name" placeholder="Party Name" class="border rounded-lg px-4 py-2 text-sm">
                        <input type="text" id="party-gst" placeholder="GST Number" class="border rounded-lg px-4 py-2 text-sm">
                        <button onclick="addParty()" class="bg-indigo-600 text-white rounded-lg text-sm font-semibold">Save Party</button>
                    </div>
                    <div id="party-list" class="mt-4"></div>
                </div>
            </div>
            
            <div id="view-inward-entry" class="hidden space-y-6">
                <div class="data-card p-6">
                    <h3 class="font-bold mb-4 text-emerald-600">New Stock Inward</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <select id="inward-item" class="border rounded-lg px-4 py-2 text-sm"></select>
                        <input type="number" id="inward-qty" placeholder="Quantity" class="border rounded-lg px-4 py-2 text-sm">
                        <button onclick="addInward()" class="bg-emerald-600 text-white rounded-lg py-2 text-sm font-semibold">Add Inward Stock</button>
                    </div>
                </div>
                <div class="data-card p-6">
                    <h3 class="font-bold mb-4 text-red-600">Report Damage</h3>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <select id="damage-item" onchange="updateDamageLots()" class="border rounded-lg px-4 py-2 text-sm"></select>
                        <select id="damage-lot" class="border rounded-lg px-4 py-2 text-sm"></select>
                        <input type="number" id="damage-qty" placeholder="Quantity" class="border rounded-lg px-4 py-2 text-sm">
                        <button onclick="addDamage()" class="bg-red-600 text-white rounded-lg py-2 text-sm font-semibold">Report Damage</button>
                    </div>
                </div>
            </div>
            
            <div id="view-inward-ledger" class="hidden data-card p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold">Inward & Damage History</h3>
                    <button onclick="exportCSV('inward')" class="text-sm bg-slate-700 text-white px-4 py-1 rounded">Download Excel</button>
                </div>
                <table class="w-full text-sm">
                    <thead class="border-b">
                        <tr class="text-left"><th>Date</th><th>Type</th><th>Lot</th><th>Material</th><th>Qty</th><th>Action</th></tr>
                    </thead>
                    <tbody id="inward-table"></tbody>
                </table>
            </div>
            
            <div id="view-booking-entry" class="hidden data-card p-6">
                <h3 class="font-bold mb-4">New Booking Entry</h3>
                <div class="space-y-4 max-w-lg">
                    <select id="b-item" class="w-full border rounded-lg px-4 py-2 text-sm"></select>
                    <select id="b-party" class="w-full border rounded-lg px-4 py-2 text-sm"></select>
                    <input type="number" id="b-qty" placeholder="Quantity" class="w-full border rounded-lg px-4 py-2 text-sm">
                    <input type="number" id="b-amount" placeholder="Booking Amount" class="w-full border rounded-lg px-4 py-2 text-sm">
                    <button onclick="addBooking()" class="w-full bg-indigo-600 text-white rounded-lg py-2 text-sm font-semibold">Book Material</button>
                </div>
            </div>
            
            <div id="view-booking-ledger" class="hidden data-card p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold">Booking Ledger</h3>
                    <button onclick="exportCSV('booking')" class="text-sm bg-slate-700 text-white px-4 py-1 rounded">Download Excel</button>
                </div>
                <table class="w-full text-sm"><thead class="border-b"><tr class="text-left"><th>Order No</th><th>Date</th><th>Firm</th><th>Material</th><th>Qty</th><th>Amount</th></tr></thead><tbody id="ledger-table"></tbody></table>
            </div>
        </div>
    </main>

    <script>
        let state = JSON.parse(localStorage.getItem('mb_stage3')) || { 
            materials: [], transactions: [], bookings: [], parties: [], 
            itemCounter: 1, lotCounter: 1, bookingCounter: 1, transactionCounter: 1 
        };

        function save() { localStorage.setItem('mb_stage3', JSON.stringify(state)); refresh(); }

        function showTab(tabId) {
            ['dashboard', 'items', 'parties', 'inward-entry', 'inward-ledger', 'booking-entry', 'booking-ledger'].forEach(id => {
                document.getElementById('view-' + id)?.classList.add('hidden');
                document.getElementById('btn-' + id)?.classList.remove('active');
            });
            document.getElementById('view-' + tabId)?.classList.remove('hidden');
            document.getElementById('btn-' + tabId)?.classList.add('active');
        }

        function exportCSV(type) {
            let csv = "data:text/csv;charset=utf-8,";
            if (type === 'inward') {
                csv += "Date,Type,Lot,Material,Qty\n";
                state.transactions.forEach(t => {
                    const m = state.materials.find(x => x.id == t.itemId);
                    csv += `${t.date},${t.type},${t.lot},${m?.name || 'Deleted'},${t.qty}\n`;
                });
            } else {
                csv += "Order No,Date,Firm,Material,Qty,Amount\n";
                state.bookings.forEach(b => {
                    const m = state.materials.find(x => x.id == b.itemId);
                    csv += `${b.orderNo},${b.date},${b.party},${m?.name || 'Deleted'},${b.qty},${b.amount}\n`;
                });
            }
            const encodedUri = encodeURI(csv);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", type + "_ledger.csv");
            document.body.appendChild(link);
            link.click();
        }

        function refresh() {
            document.getElementById('dashboard-table-body').innerHTML = state.materials.map(m => {
                const inQty = state.transactions.filter(t => t.itemId == m.id && t.type === 'inward').reduce((a,c) => a + c.qty, 0);
                const damQty = state.transactions.filter(t => t.itemId == m.id && t.type === 'damage').reduce((a,c) => a + c.qty, 0);
                const outQty = state.bookings.filter(b => b.itemId == m.id).reduce((a,c) => a + c.qty, 0);
                return `<tr><td class="py-3">${m.name}</td><td class="py-3">${inQty}</td><td class="py-3">${damQty}</td><td class="py-3">${outQty}</td><td class="py-3 font-bold">${inQty - damQty - outQty}</td></tr>`;
            }).join('');

            document.getElementById('inward-table').innerHTML = state.transactions.map(t => {
                const m = state.materials.find(x => x.id == t.itemId);
                return `<tr><td class="py-2">${t.date}</td><td class="py-2 font-bold ${t.type==='damage'?'text-red-500':'text-emerald-500'}">${t.type.toUpperCase()}</td><td class="py-2">${t.lot}</td><td class="py-2">${m?.name || 'Deleted'}</td><td class="py-2">${t.qty}</td><td class="py-2"><button onclick="deleteTrans(${t.id})" class="text-red-500">Delete</button></td></tr>`;
            }).join('');

            document.getElementById('ledger-table').innerHTML = state.bookings.map(b => {
                const m = state.materials.find(x => x.id == b.itemId);
                return `<tr><td class="py-2">${b.orderNo}</td><td class="py-2">${b.date}</td><td class="py-2">${b.party}</td><td class="py-2">${m?.name || 'Deleted'}</td><td class="py-2">${b.qty}</td><td class="py-2">${b.amount}</td></tr>`;
            }).join('');

            const opts = state.materials.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
            document.getElementById('inward-item').innerHTML = document.getElementById('damage-item').innerHTML = document.getElementById('b-item').innerHTML = opts;
            document.getElementById('b-party').innerHTML = state.parties.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
        }

        function deleteTrans(id) { state.transactions = state.transactions.filter(t => t.id !== id); save(); }
        function addMaterial() { state.materials.push({ id: Date.now(), name: document.getElementById('new-item-name').value }); save(); }
        function addParty() { state.parties.push({ id: Date.now(), name: document.getElementById('party-name').value }); save(); }
        function addInward() { state.transactions.push({ id: state.transactionCounter++, itemId: document.getElementById('inward-item').value, qty: parseInt(document.getElementById('inward-qty').value), type: 'inward', lot: 'LOT-' + state.lotCounter++, date: new Date().toLocaleDateString() }); save(); }
        function addDamage() { state.transactions.push({ id: state.transactionCounter++, itemId: document.getElementById('damage-item').value, qty: parseInt(document.getElementById('damage-qty').value), type: 'damage', lot: document.getElementById('damage-lot').value, date: new Date().toLocaleDateString() }); save(); }
        function addBooking() { state.bookings.push({ orderNo: 'BK-' + state.bookingCounter++, itemId: document.getElementById('b-item').value, party: document.getElementById('b-party').value, qty: parseInt(document.getElementById('b-qty').value), amount: document.getElementById('b-amount').value, date: new Date().toLocaleDateString() }); save(); }
        function updateDamageLots() { const lots = state.transactions.filter(t => t.itemId == document.getElementById('damage-item').value && t.type === 'inward'); document.getElementById('damage-lot').innerHTML = lots.map(l => `<option value="${l.lot}">${l.lot}</option>`).join(''); }

        refresh();
    </script>
</body>
</html>
